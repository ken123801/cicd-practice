name: "Test"

on:
  push:
    branches:
     - main
  pull_request:
    branches:
     - main

jobs:
  test:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: uv sync 
      - name: Run tests
        run: uv run pytest tests/